{% extends "base.html" %}
{% block title %}Top IES {{ modality }}{% endblock %}

{% block content %}
<h2 class="h4 mb-1">Top Instituições em 2023 — {{ modality }}</h2>
<p class="text-muted mb-3">Instituições com maior número de matrículas na Região Sul em 2023.</p>

<!-- Modality switch -->
<div class="mb-2">
  <a href="/enrollment/top-institutions/Presencial?adm_filter={{ adm_filter }}"
     class="btn btn-sm {% if modality == 'Presencial' %}btn-primary{% else %}btn-outline-primary{% endif %} me-1">
    Presencial
  </a>
  <a href="/enrollment/top-institutions/EaD?adm_filter={{ adm_filter }}"
     class="btn btn-sm {% if modality == 'EaD' %}btn-primary{% else %}btn-outline-secondary{% endif %}">
    EaD
  </a>
</div>

<!-- Adm filter with HTMX -->
<form class="row g-2 align-items-end mb-4"
      hx-get="/enrollment/top-institutions/{{ modality }}/table"
      hx-target="#inst-table-area"
      hx-trigger="change"
      hx-include="this">
  <div class="col-auto">
    <label class="form-label fw-semibold" for="adm_filter">Categoria Administrativa</label>
    <select class="form-select" id="adm_filter" name="adm_filter">
      <option value="Todos" {% if adm_filter == "Todos" %}selected{% endif %}>Todas</option>
      <option value="Públicas" {% if adm_filter == "Públicas" %}selected{% endif %}>Públicas</option>
      <option value="Privadas" {% if adm_filter == "Privadas" %}selected{% endif %}>Privadas</option>
    </select>
  </div>
</form>

<div id="inst-table-area">
  {% include "partials/_ranking_table.html" %}
</div>
{% endblock %}
