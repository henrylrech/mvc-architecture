{% extends "base.html" %}
{% block title %}Matrículas por Ano{% endblock %}

{% block content %}
<h2 class="h4 mb-3">Total de Matrículas por Ano — Região Sul</h2>

<form class="row g-2 align-items-end mb-4"
      hx-get="/enrollment/enrollment-by-year/chart"
      hx-target="#chart-area"
      hx-trigger="change"
      hx-include="this">
  <div class="col-auto">
    <label class="form-label fw-semibold" for="modality">Modalidade</label>
    <select class="form-select" id="modality" name="modality">
      <option value="Todos" {% if modality == "Todos" %}selected{% endif %}>Todas</option>
      <option value="Presencial" {% if modality == "Presencial" %}selected{% endif %}>Presencial</option>
      <option value="EaD" {% if modality == "EaD" %}selected{% endif %}>EaD</option>
    </select>
  </div>
</form>

<div id="chart-area">
  {% include "partials/_enrollment_chart.html" %}
</div>
{% endblock %}
